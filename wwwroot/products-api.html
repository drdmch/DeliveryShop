<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Farmix API - Товари</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-success m-0"><i class="bi bi-box-seam-fill me-2"></i>Адміністрування товарів (Web API)</h1>
            <a href="/Admin/Index" class="btn btn-outline-secondary d-flex align-items-center fw-bold" style="border-radius: 8px;">
                <i class="bi bi-arrow-left me-2"></i> Назад до панелі
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4 bg-white" id="editProductCard" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="fw-bold m-0" style="font-size: 1.25rem;">Редагувати: <span id="edit-title"></span></h3>
                <button onclick="closeInput()" class="btn-close"></button>
            </div>
            <form action="javascript:void(0);" onsubmit="updateProduct()" class="row g-2">
                <input type="hidden" id="edit-id">
                <div class="col-md-5">
                    <label class="form-label small fw-bold">Ціна (грн)</label>
                    <input type="number" id="edit-price" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label small fw-bold">Кількість на складі</label>
                    <input type="number" id="edit-stock" class="form-control" min="0" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Зберегти</button>
                </div>
            </form>
        </div>

        <div class="card border-0 shadow-sm rounded-4 bg-white p-3">
            <p id="counter" class="text-muted small px-2 mb-2"></p>
            <div class="table-responsive">
                <table class="table align-middle m-0">
                    <thead class="table-light">
                        <tr>
                            <th>Назва товару</th>
                            <th>Ціна</th>
                            <th>Залишок на складі</th>
                            <th style="width: 150px;" class="text-center">Дії</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/products-api.js"></script>
    <script type="text/javascript">
        getProducts();
    </script>
</body>
</html>
